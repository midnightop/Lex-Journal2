<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Law Journal</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <h2 class="logo">LAW JOURNAL</h2>
</header>

<section class="hero">
  <h1>Calcutta <span>Law Journal</span></h1>
  <p>Understanding law should not be complicated.</p>

  <div class="btn-group">
    <button class="btn blue">Explore Bare Acts</button>
    <button class="btn pink">Read Articles</button>
  </div>
</section>

<section class="articles">
  <h2>Recent from the Journal</h2>

  <div class="article" onclick="openModal('kesavananda')">
    <h3>Kesavananda Bharati Case</h3>
    <p>Foundation of Basic Structure Doctrine in India.</p>
  </div>

  <div class="article" onclick="openModal('privacy')">
    <h3>Right to Privacy Case</h3>
    <p>Declared privacy as a fundamental right.</p>
  </div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h2 id="modal-title"></h2>
    <p id="modal-text"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
